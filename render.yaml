# Blueprint do Render para o backend (FastAPI + motor de scraping).
# No Render: New + > Blueprint > conecte o repo ReyvisonBraz/DETRAN.
# Ele le este arquivo e cria o servico. So falta setar a chave TWOCAPTCHA_API_KEY.
services:
  - type: web
    name: detran-api
    runtime: docker
    repo: https://github.com/ReyvisonBraz/DETRAN
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /healthz
    envVars:
      - key: TWOCAPTCHA_API_KEY
        sync: false          # voce cola a chave no painel do Render (nao fica no git)
      - key: CORS_ORIGINS
        value: "*"           # depois troque pela URL do painel no Vercel
      - key: MAX_WORKERS
        value: "2"
